[General]
network = RplNetwork49  
sim-time-limit = 3600s

# Basic simulation parameters for the 49-node topology
**.numNodes = 49      # 7x7 grid of host nodes
warmup-period = 80s
repeat = 1000        
num-rngs = 10

**.mobility.rng-0 = 1
**.wlan[*].mac.rng-0 = 2

# Network layer settings
**.hasIpv6 = true
**.hasIpv4 = false
**.mtu = 1500B

**.neighbourDiscovery.raEnabled = false
**.neighbourDiscovery.addRandomDelays = true
**.neighbourDiscovery.skipDad = true

# IEEE 802.15.4 physical layer
**.radioMedium.typename = "Ieee802154NarrowbandDimensionalRadioMedium"
**.radio.typename = "Ieee802154NarrowbandDimensionalRadio"

# Log-normal shadowing model used for the wireless channel
**.radioMedium.backgroundNoise.power = -110dBm
**.radioMedium.attenuation.typename = "LogNormalShadowing"
**.radioMedium.attenuation.pathLossExponent = 3.5  
**.radioMedium.attenuation.sigma = 6.0  

# MAC layer settings
**.wlan[*].typename = "Ieee802154NarrowbandInterface"
**.wlan[*].mac.typename = "Ieee802154Mac"

# IEEE 802.15.4 radio parameters
**.wlan[0].radio.transmitter.bitrate = 250kbps  
**.wlan[0].radio.receiver.sensitivity = -85dBm   
**.wlan[0].radio.transmitter.power = 1mW       

# RPL routing parameters
**.sink[*].rpl.isRoot = true
**.sink[*].rpl.storing = true
**.rpl.numDaoRetransmitAttempts = 10
**.rpl.daoEnabled = true
**.rpl.poisoning = false
**.rpl.useBackupAsPreferred = false
**.rpl.networkProtocolModule = "^.ipv6.ipv6"
**.rpl.routingTableModule = "^.ipv6.routingTable"
**.rpl.drawConnectors = true

# Simulation area and node mobility
**.numSinks = 1
**.sensor[*].mobility.typename = "StationaryMobility"
**.sink[*].mobility.typename   = "StationaryMobility"
**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMinY = 0m
**.mobility.constraintAreaMaxX = 600m  
**.mobility.constraintAreaMaxY = 600m

# Mobility models
*.sink[*].mobility.initialZ = 0m
*.host[*].mobility.typename = "StationaryMobility"
*.host[*].mobility.initFromDisplayString = false
*.host[*].mobility.initialZ = 0m

# Sink/root position near the center of the grid
*.sink[0].mobility.initialX = 160m
*.sink[0].mobility.initialY = 120m

# 7x7 grid deployment with 40 m spacing

